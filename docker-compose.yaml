services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_FILE: /app/data/kareone.sqlite
    ports:
      # HOST_PORT is the host port; the app continues listening on 3000 in the container.
      - "${HOST_PORT:-3006}:3000"
    volumes:
      - kareone-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  kareone-data:
